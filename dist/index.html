  id="ghost"
  class="pointer-events-none absolute inset-0 px-6 py-4 text-lg rounded-2xl text-center text-white/20 whitespace-nowrap overflow-hidden flex items-center justify-center"
  aria-hidden="true"
></div>

<input
  id="search"
  type="text"
  autocomplete="off"
  spellcheck="false"
  placeholder="Type a word..."
  class="relative z-10 w-full px-6 py-4 text-lg rounded-2xl
  bg-white/[0.02] backdrop-blur-xl
  border border-white/5
  text-white/80
  placeholder:text-white/30

  text-center
  shadow-[0_10px_40px_rgba(0,0,0,0.45)]"
/>
        <div
          id="suggestions"
           class="absolute left-0 right-0 mt-3 hidden overflow-hidden rounded-2xl border border-white/8 bg-white/[0.04] backdrop-blur-2xl shadow-[0_20px_50px_rgba(0,0,0,0.35)]"

  <!-- footer -->

    <span class="mx-1 text-white/20">·</span>
    
    <a href="https://github.com/timmoth" target="_blank" rel="noopener noreferrer" class="underline decoration-white/20 underline-offset-4 hover:text-white/70">
      Tim Jones
    </a>
  </div>

<script>
    /*
   ________________________________________
  /                                        \
 |   It's open source - just check out     |
 |   the repo ;)                           |
 |                                          |
 |   https://github.com/Timmoth/termfull   |
  \________________________________________/
          \   ^__^
           \  (oo)\_______
              (__)\       )\/\
                  ||----w |
                  ||     ||
*/
const NUM_SHARDS = 101;
const shardCache = {};
let animationFrame;
let nodes = [];

// -------- AUTOCOMPLETE --------
let dictionary = [];
let dictionaryFreqMap = {};
let filteredSuggestions = [];
let selectedSuggestionIndex = -1;
let currentGhost = "";
let dictionaryLoaded = false;
const TOTAL_CHUNKS = 9;
const loadedChunkIds = new Set();
let dictionaryLoadPromise = null;

function getCenter() {
  if (window.visualViewport) {
    return {
      x: window.visualViewport.width / 2,
      y: window.visualViewport.height / 2
    };
  }
  return {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
  };
}

async function loadDictionaryChunk(chunkIdx) {
  if (loadedChunkIds.has(chunkIdx)) return false;

  const chunkNum = String(chunkIdx).padStart(3, "0");
  const res = await fetch(`words_freq_chunk_${chunkNum}.csv`);
  const text = await res.text();
  const lines = text.split('\n');

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const word = (cols[0] || "").trim().toLowerCase();
    const freq = Number((cols[1] || "").trim());

    if (!word) continue;
    if (Number.isNaN(freq)) continue;

    if (!(word in dictionaryFreqMap)) {
      dictionary.push(word);
      dictionaryFreqMap[word] = freq;
    }
  }

  loadedChunkIds.add(chunkIdx);
  return true;
}

async function loadDictionary() {
  if (dictionaryLoadPromise) return dictionaryLoadPromise;

  dictionaryLoadPromise = (async () => {
    try {
      for (let chunkIdx = 0; chunkIdx < TOTAL_CHUNKS; chunkIdx++) {
        await loadDictionaryChunk(chunkIdx);
        if (chunkIdx < TOTAL_CHUNKS - 1) {
          await new Promise(resolve => setTimeout(resolve, 0));
        }
      }
      dictionaryLoaded = true;
    } catch (err) {
      console.warn("Could not load words_freq chunks for autocomplete", err);
    }
  })();

  return dictionaryLoadPromise;
}

async function findWordFreqProgressively(targetWord) {
  const q = (targetWord || "").trim().toLowerCase();
  if (!q) return null;

  if (q in dictionaryFreqMap) {
    return dictionaryFreqMap[q];
  }

  for (let chunkIdx = 0; chunkIdx < TOTAL_CHUNKS; chunkIdx++) {
    if (!loadedChunkIds.has(chunkIdx)) {
      await loadDictionaryChunk(chunkIdx);
    }
    if (q in dictionaryFreqMap) {
      return dictionaryFreqMap[q];
    }
  }
  return null;
}

function setGhostText(inputValue, suggestion) {
  const ghost = document.getElementById("ghost");

  if (
    !inputValue ||
    !suggestion ||
    !suggestion.startsWith(inputValue.toLowerCase()) ||
    suggestion === inputValue.toLowerCase()
  ) {
    ghost.textContent = "";
    currentGhost = "";
    return;
  }

  currentGhost = suggestion;

  const typed = inputValue;
  const remaining = suggestion.slice(inputValue.length);
  ghost.innerHTML = `<span class="opacity-0">${escapeHtml(typed)}</span><span>${escapeHtml(remaining)}</span>`;
}

function clearSuggestions() {
  filteredSuggestions = [];
  selectedSuggestionIndex = -1;
  document.getElementById("suggestions").classList.add("hidden");
  document.getElementById("suggestions").innerHTML = "";
  setGhostText("", "");
}

function renderSuggestions(inputValue) {
  const box = document.getElementById("suggestions");

  if (!inputValue) {
    clearSuggestions();
    // Clear URL if no input
    if (dictionaryLoaded) {
      history.replaceState(null, '', window.location.pathname);
    }
    return;
  }

  if (!dictionaryLoaded && dictionary.length < 1000) {
    clearSuggestions();
    return;
  }

  const q = inputValue.toLowerCase().trim();
  if (!q) {
    clearSuggestions();
    return;
  }

  const starts = [];
  const contains = [];

  for (const word of dictionary) {
    if (word.startsWith(q)) {
      starts.push(word);
    } else if (word.includes(q)) {
      contains.push(word);
    }
    // Stop after finding enough matches for better performance during load
    if (starts.length + contains.length >= 50) break;
  }

  const byFreqDesc = (a, b) => {
    const fa = dictionaryFreqMap[a] ?? -1;
    const fb = dictionaryFreqMap[b] ?? -1;

    if (fb !== fa) return fb - fa;
    return a.localeCompare(b);
  };

  starts.sort(byFreqDesc);
  contains.sort(byFreqDesc);

  filteredSuggestions = [...starts, ...contains].slice(0, 8);

  if (!filteredSuggestions.length) {
    clearSuggestions();
    return;
  }

  if (selectedSuggestionIndex >= filteredSuggestions.length) {
    selectedSuggestionIndex = -1;
  }

  const ghostSuggestion =
    selectedSuggestionIndex >= 0
      ? filteredSuggestions[selectedSuggestionIndex]
      : filteredSuggestions[0];

  setGhostText(inputValue, ghostSuggestion);

  box.innerHTML = filteredSuggestions.map((word, i) => {
    const active = i === selectedSuggestionIndex;
    const freq = dictionaryFreqMap[word] ?? "";

    return `
      <button
        type="button"
        data-index="${i}"
        class="w-full flex items-center justify-between gap-3 px-4 py-3 text-sm transition-colors ${
          active ? "bg-white/12 text-white" : "text-white/75 hover:bg-white/8 hover:text-white"
        }"
      >
        <span>${highlightMatch(word, q)}</span>
        <span class="text-xs text-white/35">${freq}</span>
      </button>
    `;
  }).join("");

  box.classList.remove("hidden");

  [...box.querySelectorAll("button")].forEach(btn => {
    btn.addEventListener("mousedown", (e) => {
      e.preventDefault();
      const i = Number(btn.dataset.index);
      acceptSuggestion(i);
    });
  });
}

function acceptSuggestion(index = null) {
  const search = document.getElementById("search");

  let chosen = null;

  if (index !== null && filteredSuggestions[index]) {
    chosen = filteredSuggestions[index];
  } else if (selectedSuggestionIndex >= 0 && filteredSuggestions[selectedSuggestionIndex]) {
    chosen = filteredSuggestions[selectedSuggestionIndex];
  } else if (filteredSuggestions[0]) {
    chosen = filteredSuggestions[0];
  } else if (currentGhost) {
    chosen = currentGhost;
  }

  if (!chosen) return;

  search.value = chosen;
  
  // Update URL with chosen word
  const params = new URLSearchParams(window.location.search);
  params.set('q', chosen);
  history.replaceState(null, '', `?${params.toString()}`);
  
  clearSuggestions();
  performSearch(chosen);
}

function highlightMatch(word, q) {
  const idx = word.indexOf(q);
  if (idx === -1) return escapeHtml(word);

  const before = escapeHtml(word.slice(0, idx));
  const match = escapeHtml(word.slice(idx, idx + q.length));
  const after = escapeHtml(word.slice(idx + q.length));
  return `${before}<span class="text-blue-300">${match}</span>${after}`;
}

function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// -------- STYLE HELPERS --------
function getSize(i, total) {
  const isMobile = window.innerWidth < 768;
  const baseSize = isMobile ? 26 : 38;
  const range = isMobile ? 16 : 26;
  return baseSize - (i / total) * range;
}

function getOpacity(i, total) {
  return 1 - (i / total) * 0.6;
}

function getHue(i) {
  const hues = [200, 220, 240];
  return hues[i % hues.length];
}

// -------- LOAD --------
async function loadShard(id) {
  if (shardCache[id]) return shardCache[id];

  const res = await fetch(`shards/shard_${String(id).padStart(3, "0")}.csv`);
  const text = await res.text();

  const lines = text.trim().split(/\r?\n/);
  const data = {};

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const word = (cols[0] || "").trim().toLowerCase();
    const freq = (cols[1] || "").trim();
    const neighbors = cols.slice(2).map(v => v.trim()).filter(Boolean);

    if (!word) continue;

    data[word] = {
      freq,
      neighbors
    };
  }

  shardCache[id] = data;
  return data;
}

async function getNeighbors(word) {
  word = word.toLowerCase().trim();

  let shardId = dictionaryFreqMap[word];
  if (shardId === undefined || shardId === null || Number.isNaN(shardId)) {
    shardId = await findWordFreqProgressively(word);
  }

  if (shardId === undefined || shardId === null || Number.isNaN(shardId)) {
    return null;
  }

  const shard = await loadShard(shardId);
  const row = shard[word];

  if (!row) return null;
  return row.neighbors || null;
}

async function performSearch(word) {
  word = word.toLowerCase().trim();
  if (!word) return false;

  let shardId = dictionaryFreqMap[word];
  if (shardId === undefined || shardId === null || Number.isNaN(shardId)) {
    shardId = await findWordFreqProgressively(word);
  }

  if (shardId === undefined || shardId === null || Number.isNaN(shardId)) {
    return false;
  }

  const shard = await loadShard(shardId);
  const row = shard[word];

  if (!row || !row.neighbors || !row.neighbors.length) {
    return false;
  }

  updateNodes(row.neighbors);
  return true;
}

// -------- CREATE --------
function createNodes(words) {
  const cloud = document.getElementById("cloud");
  const svg = document.getElementById("lines");

  cloud.innerHTML = "";
  svg.innerHTML = "";

  const { x: cx, y: cy } = getCenter();

  nodes = words.map((word, i) => {
    const angle = Math.random() * Math.PI * 2;
    const radius = 150 + Math.random() * 250;

    const size = getSize(i, words.length);
    const hue = getHue(i);

    const node = {
      word,
      freq: i + 1,
      x: cx + Math.cos(angle) * radius,
      y: cy + Math.sin(angle) * radius,
      vx: 0,
      vy: 0,
      size,
      offset: Math.random() * 1000
    };

    const el = document.createElement("div");

    el.className = `
      absolute font-medium cursor-pointer
      px-3 py-1.5 rounded-full
      backdrop-blur-md
      border border-white/10
      transition-all duration-300 ease-out
      hover:scale-110 hover:text-white
    `;

    el.style.background = `hsla(${hue}, 70%, 60%, 0.08)`;
    el.style.color = `hsla(${hue}, 90%, 85%, ${getOpacity(i, words.length)})`;

    el.innerHTML = `<span>${escapeHtml(word)}</span>`;

    el.style.fontSize = `${size}px`;
    el.style.opacity = getOpacity(i, words.length);
    el.style.visibility = "visible";

    el.addEventListener("pointerdown", (e) => {
      draggingNode = node;
      lastMouse.x = e.clientX;
      lastMouse.y = e.clientY;
      el.setPointerCapture(e.pointerId);
    });

    el.addEventListener("pointerup", () => draggingNode = null);

    el.addEventListener("pointermove", (e) => {
      if (!draggingNode || draggingNode !== node) return;

      const dx = e.clientX - lastMouse.x;
      const dy = e.clientY - lastMouse.y;

      node.x = e.clientX;
      node.y = e.clientY;
      node.vx = dx;
      node.vy = dy;

      lastMouse.x = e.clientX;
      lastMouse.y = e.clientY;
    });

    el.onclick = () => {
      search.value = node.word;
      const params = new URLSearchParams(window.location.search);
      params.set('q', node.word);
      history.replaceState(null, '', `?${params.toString()}`);
      performSearch(node.word);
    };

    cloud.appendChild(el);
    node.el = el;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("stroke", "#60a5fa");
    line.setAttribute("stroke-opacity", "0.12");
    line.setAttribute("stroke-width", "3");

    svg.appendChild(line);
    node.line = line;

    return node;
  });

  animate(0);
}

// -------- UPDATE --------
function updateNodes(words) {
  if (nodes.length === 0) {
    createNodes(words);
    return;
  }

  nodes.forEach((node, i) => {
    node.word = words[i] || "";
    node.freq = i + 1;
    node.size = getSize(i, words.length);

    node.el.innerHTML = node.word ? `<span>${escapeHtml(node.word)}</span>` : "";

    node.el.style.fontSize = `${node.size}px`;
    node.el.style.opacity = node.word ? getOpacity(i, words.length) : 0;
    node.el.style.visibility = node.word ? "visible" : "hidden";
  });
}

// -------- DRAG --------
let draggingNode = null;
let lastMouse = { x: 0, y: 0 };

window.addEventListener("mousemove", (e) => {
  if (!draggingNode) return;

  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;

  draggingNode.x = e.clientX;
  draggingNode.y = e.clientY;

  draggingNode.vx = dx;
  draggingNode.vy = dy;

  lastMouse.x = e.clientX;
  lastMouse.y = e.clientY;
});

window.addEventListener("mouseup", () => {
  draggingNode = null;
});

// -------- ANIMATION --------
function animate(time) {
  const { x: cx, y: cy } = getCenter();
  const centerRadius = 160;

  nodes.forEach(a => {
    if (a === draggingNode) return;

    a.vx += Math.sin(time * 0.001 + a.offset) * 0.05;
    a.vy += Math.cos(time * 0.001 + a.offset) * 0.05;

    let dx = a.x - cx;
    let dy = a.y - cy;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;

    const min = centerRadius + a.size * 2;

    if (dist < min) {
      const push = (min - dist);
      dx /= dist;
      dy /= dist;

      a.x += dx * push;
      a.y += dy * push;

      a.vx += dx * push * 0.2;
      a.vy += dy * push * 0.2;
    }
  });

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;

      const range = 220;

      if (dist < range) {
        dx /= dist;
        dy /= dist;

        const force = (1 - dist / range) * 0.08;

        if (a !== draggingNode) {
          a.vx -= dx * force;
          a.vy -= dy * force;
        }
        if (b !== draggingNode) {
          b.vx += dx * force;
          b.vy += dy * force;
        }
      }
    }
  }

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;

      const min = 60 + a.size + b.size;

      if (dist < min) {
        const overlap = (min - dist);

        dx /= dist;
        dy /= dist;

        if (a !== draggingNode) {
          a.x -= dx * overlap * 0.6;
          a.y -= dy * overlap * 0.6;
        }
        if (b !== draggingNode) {
          b.x += dx * overlap * 0.6;
          b.y += dy * overlap * 0.6;
        }
      }
    }
  }

  nodes.forEach(n => {
    if (n !== draggingNode) {
      n.vx *= 0.88;
      n.vy *= 0.88;

      n.x += n.vx;
      n.y += n.vy;
    }

    n.el.style.left = `${n.x}px`;
    n.el.style.top = `${n.y}px`;
    n.el.style.transform = "translate(-50%, -50%)";

    const rect = n.el.getBoundingClientRect();
    const halfW = rect.width / 2;
    const halfH = rect.height / 2;

    const minX = halfW;
    const maxX = window.innerWidth - halfW;
    const minY = halfH;
    const maxY = window.innerHeight - halfH;

    n.x = Math.max(minX, Math.min(maxX, n.x));
    n.y = Math.max(minY, Math.min(maxY, n.y));

    if (n.x === minX || n.x === maxX) n.vx *= -0.3;
    if (n.y === minY || n.y === maxY) n.vy *= -0.3;

    n.el.style.left = `${n.x}px`;
    n.el.style.top = `${n.y}px`;

    const dx = n.x - cx;
    const dy = n.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const maxDist = Math.min(cx, cy);
    const fade = 1 - (dist / maxDist);

    n.el.style.opacity = Math.max(0.52, fade * 0.85);
    n.el.style.filter = `blur(${(1 - fade) * 0.5}px)`;

    const rect2 = n.el.getBoundingClientRect();
    const cx2 = rect2.left + rect2.width / 2;
    const cy2 = rect2.top + rect2.height / 2;

    n.line.setAttribute("x1", cx);
    n.line.setAttribute("y1", cy);
    n.line.setAttribute("x2", cx2);
    n.line.setAttribute("y2", cy2);
    n.line.style.opacity = n.word ? "0.12" : "0";
  });

  animationFrame = requestAnimationFrame(animate);
}

// -------- INPUT --------
let timeout;
const search = document.getElementById("search");

search.addEventListener("input", (e) => {
  clearTimeout(timeout);
  renderSuggestions(e.target.value);

  // Update URL query param
  if (e.target.value) {
    const params = new URLSearchParams(window.location.search);
    params.set('q', e.target.value);
    history.replaceState(null, '', `?${params.toString()}`);
  } else {
    history.replaceState(null, '', window.location.pathname);
  }

  timeout = setTimeout(() => {
    performSearch(e.target.value);
  }, 200);
});

search.addEventListener("change", (e) => {
  // Trigger search when user presses Enter or accepts a suggestion
  if (e.target.value) {
    performSearch(e.target.value);
  }
});

search.addEventListener("keydown", (e) => {
  if (e.key === "Tab") {
    if (filteredSuggestions.length) {
      e.preventDefault();
      acceptSuggestion();
    }
    return;
  }

  if (e.key === "ArrowDown") {
    if (!filteredSuggestions.length) return;
    e.preventDefault();
    selectedSuggestionIndex = (selectedSuggestionIndex + 1) % filteredSuggestions.length;
    renderSuggestions(search.value);
    // Update URL as we navigate
    const params = new URLSearchParams(window.location.search);
    params.set('q', filteredSuggestions[selectedSuggestionIndex]);
    history.replaceState(null, '', `?${params.toString()}`);
    return;
  }

  if (e.key === "ArrowUp") {
    if (!filteredSuggestions.length) return;
    e.preventDefault();
    selectedSuggestionIndex = selectedSuggestionIndex <= 0
      ? filteredSuggestions.length - 1
      : selectedSuggestionIndex - 1;
    renderSuggestions(search.value);
    // Update URL as we navigate
    const params = new URLSearchParams(window.location.search);
    params.set('q', filteredSuggestions[selectedSuggestionIndex]);
    history.replaceState(null, '', `?${params.toString()}`);
    return;
  }

  if (e.key === "Enter") {
    if (selectedSuggestionIndex >= 0 && filteredSuggestions[selectedSuggestionIndex]) {
      e.preventDefault();
      acceptSuggestion(selectedSuggestionIndex);
      return;
    }

    clearSuggestions();
    performSearch(search.value);
    return;
  }

  if (e.key === "Escape") {
    clearSuggestions();
  }
});

search.addEventListener("blur", () => {
  setTimeout(() => {
    document.getElementById("suggestions").classList.add("hidden");
  }, 100);
});

search.addEventListener("focus", () => {
  if (search.value.trim()) {
    renderSuggestions(search.value);
    if (!dictionaryLoaded) {
      // If dict still loading, trigger search after load completes
      const checkLoad = setInterval(() => {
        if (dictionaryLoaded) {
          clearInterval(checkLoad);
          performSearch(search.value);
        }
      }, 100);
    }
  }
});

window.addEventListener("resize", () => {
  nodes.forEach(n => {
    n.x = Math.max(0, Math.min(window.innerWidth, n.x));
    n.y = Math.max(0, Math.min(window.innerHeight, n.y));
  });
});

const GREETINGS = [
  "hello", "welcome", "hey", "friend", "friends", "love", "happy", "joy", 
  "smile", "sunshine", "bright", "warm", "kind", "peace", "hope", 
  "cheers", "good", "morning", "night", "evening", "today", "mate"
];

function randomGreeting() {
  return GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
}

// -------- STAR FIELD --------
let starCanvas, starCtx;
let stars = [];

function initStarField() {
  starCanvas = document.getElementById('stars');
  starCtx = starCanvas.getContext('2d');
  
  resizeStarCanvas();
  createStars();
  animateStars();
}

function resizeStarCanvas() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}

function createStars() {
  stars = [];
  const numStars = Math.floor((window.innerWidth * window.innerHeight) / 8000);
  
  for (let i = 0; i < numStars; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
      size: Math.random() * 1.5 + 0.5,
      opacity: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.01,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}

function animateStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  
  const time = Date.now() * 0.001;
  
  stars.forEach(star => {
    // Gentle drift
    star.x += star.vx;
    star.y += star.vy;
    
    // Wrap around screen
    if (star.x < 0) star.x = starCanvas.width;
    if (star.x > starCanvas.width) star.x = 0;
    if (star.y < 0) star.y = starCanvas.height;
    if (star.y > starCanvas.height) star.y = 0;
    
    const twinkle = Math.sin(time * 2 + star.twinkleOffset) * 0.3 + 0.7;
    const opacity = star.opacity * twinkle;
    
    starCtx.beginPath();
    starCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    starCtx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
    starCtx.shadowBlur = 4;
    starCtx.shadowColor = 'rgba(255, 255, 255, 0.5)';
    starCtx.fill();
    starCtx.shadowBlur = 0;
  });
  
  requestAnimationFrame(animateStars);
}

window.addEventListener('resize', resizeStarCanvas);

// startup
async function startup() {
  const params = new URLSearchParams(window.location.search);
  let query = params.get('q');

  // If no query param, pick a random greeting
  if (!query) {
    query = randomGreeting();
  }

  initStarField();

  // Start full dictionary loading in background
  loadDictionary();

  search.value = query.trim().toLowerCase();

  const ok = await performSearch(query.trim().toLowerCase());

  if (!ok) {
    console.warn("Could not resolve query:", query);
  }
}

startup();
</script>
